pipeline:
  max_qa_retries: 3
  fail_on_critical_quality: true
  parallel_execution: true

data_source:
  active: "sample"
  sample:
    race_id: "20260607-Tokyo-11"
  production:
    http:
      user_agent: "keiba-prediction/0.1.0 (educational research)"
      min_interval_seconds: 7
      daily_request_budget: 500
      timeout_seconds: 30
      max_retries: 2
    cache:
      directory: "data/store/cache"
      default_ttl_seconds: 3600
      ttl_overrides:
        race_result: 604800
        odds: 300
        training_report: 86400
    netkeiba:
      enabled: true
      base_url: "https://db.netkeiba.com"
    jra:
      enabled: true
      base_url: "https://www.jra.go.jp"

logging:
  level: "INFO"
  format: "structured"
  log_dir: "output/logs"
  per_agent_files: true

output:
  json_dir: "output/json"
  markdown_dir: "output/markdown"
  save_intermediate: true

analysis:
  method: "statistical"
  feature_weights:
    distance_aptitude: 0.15
    track_aptitude: 0.12
    recent_form: 0.20
    closing_speed: 0.15
    running_style: 0.08
    jockey_stats: 0.12
    trainer_stats: 0.08
    pedigree: 0.05
    weight_factors: 0.05

odds:
  max_web_evidence_adjustment: 0.15
  value_threshold: 0.10
  skip_if_no_value: true

quality:
  passing_score: 100
  total_score: 120
  prohibited_words:
    - "絶対"
    - "確定"
    - "鉄板"
    - "必ず儲かる"
    - "回収保証"
    - "100%"
    - "間違いなく"

note:
  disclaimer: |
    ※本予想は個人的な分析に基づくものであり、馬券の購入を保証するものではありません。
    競馬にはリスクがあり、投資額以上の損失が生じる可能性があります。
    自己責任でご判断ください。
